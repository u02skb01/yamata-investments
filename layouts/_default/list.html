{{ define "main" }}
<section class="list">
    <h1>{{ .Title }}</h1>
    <div class="content">
        {{ .Content }}
    </div>
    <ul class="news-list" style="margin-top: 2rem;">
        {{ range .Pages }}
        <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            <span style="font-size: 0.8rem; opacity: 0.6; margin-left: 1rem;">{{ .Date.Format "Jan 2, 2006" }}</span>
        </li>
        {{ end }}
    </ul>
</section>
{{ end }}
